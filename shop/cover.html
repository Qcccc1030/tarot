<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星辰塔罗馆 · 视频封面</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 1.5rem;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  }

  .cover {
    width: 540px; height: 960px;
    background: linear-gradient(180deg, #08051a 0%, #0d0a28 30%, #120e38 60%, #0a0820 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    box-shadow: 0 0 80px rgba(100,60,180,0.3);
  }

  /* 星空 */
  .cover::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 15% 10%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 25% 22%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 70% 8%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 40% 35%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 10% 45%, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 60% 42%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 30% 58%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 50% 52%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 75% 65%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 20% 72%, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 85% 78%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 15% 88%, rgba(255,255,255,0.5), transparent);
  }

  /* 光晕 */
  .cover::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    filter: blur(180px);
    opacity: 0.09;
    background: radial-gradient(circle, #7b3fff, transparent);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* 内容 */
  .cover-content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 1.2rem;
  }

  .cover-icon {
    font-size: 6rem;
    filter: drop-shadow(0 0 30px rgba(200,150,100,0.4));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .cover-title {
    font-size: 3rem; font-weight: 200;
    letter-spacing: 0.3em;
    background: linear-gradient(180deg, #e0c090, #d4a574, #c9b8e4, #d4a574);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.3;
  }

  .cover-sub {
    font-size: 1.1rem;
    color: rgba(200,180,160,0.55);
    letter-spacing: 0.3em;
  }

  .cover-divider {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,165,116,0.5), transparent);
  }

  .cover-feature {
    font-size: 1.3rem;
    color: #d4a574;
    letter-spacing: 0.15em;
    font-weight: 300;
  }

  .cover-bottom {
    position: absolute; bottom: 5rem; z-index: 1;
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }

  .cover-bottom .tag {
    font-size: 1.1rem;
    color: rgba(200,180,160,0.6);
    letter-spacing: 0.2em;
  }

  .cover-bottom .hint {
    font-size: 0.85rem;
    color: rgba(200,180,160,0.35);
    letter-spacing: 0.15em;
    margin-top: 0.3rem;
  }

  /* 下载按钮 */
  .btn-download {
    padding: 0.6rem 2rem;
    background: rgba(212,165,116,0.15);
    border: 1px solid rgba(212,165,116,0.4);
    border-radius: 50px;
    color: #d4a574; font-size: 0.85rem;
    font-family: inherit; cursor: pointer;
    letter-spacing: 0.1em; transition: all 0.3s;
  }
  .btn-download:hover {
    background: rgba(212,165,116,0.25);
    box-shadow: 0 0 20px rgba(212,165,116,0.2);
  }
</style>
</head>
<body>

<button class="btn-download" onclick="downloadPNG('.cover','星辰塔罗馆-视频封面')">📥 下载封面 PNG</button>

<div class="cover">
  <div class="cover-content">
    <div class="cover-icon">🔮</div>
    <div class="cover-title">星辰塔罗馆</div>
    <div class="cover-sub">AI 智能解读 · 更客观更精准</div>
    <div class="cover-divider"></div>
    <div class="cover-feature">78 张自主选牌 · 实时正逆解读</div>
  </div>

  <div class="cover-bottom">
    <div class="tag">✦ 自己抽的牌 · 才最准 ✦</div>
    <div class="hint">← 点击左侧进入 开始占卜 →</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
function downloadPNG(selector, filename) {
  const el = document.querySelector(selector);
  html2canvas(el, { backgroundColor: '#08051a', scale: 2 }).then(canvas => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = filename + '.png';
    a.click();
  });
}
</script>
</body>
</html>
